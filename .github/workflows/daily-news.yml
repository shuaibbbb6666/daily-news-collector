name: Daily News Collector

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news collector
        env:
          SENDER_EMAIL: ${{ secrets.SMTP_USER }}
          SENDER_PASSWORD: ${{ secrets.SMTP_PASS }}
          RECEIVER_EMAIL: ${{ secrets.TO_EMAIL }}
          TianAPI_KEY: ${{ secrets.TIAN_KEY }}
        run: python daily_news_collector.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-logs-${{ github.run_id }}
          path: news_logs/
          retention-days: 30
