name: 每日新闻收集

on:
  schedule:
    # 每天北京时间 9:00（UTC 01:00）执行
    - cron: "0 1 * * *"
  # 允许手动触发（方便测试）
  workflow_dispatch:

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行新闻收集脚本
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          TianAPI_KEY: ${{ secrets.TianAPI_KEY }}
          SMTP_SERVER: ${{ vars.SMTP_SERVER || 'smtp.qq.com' }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '465' }}
        run: python daily_news_collector.py

      - name: 上传日志（artifact）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-logs-${{ github.run_id }}
          path: news_logs/
          retention-days: 30
